<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0eeff;--white:#fff;--text:#2d2640;--text2:#7c6f9a;--text3:#b8afd4;--radius:18px;--radius-sm:12px;--shadow:0 2px 14px rgba(100,80,180,.10);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{background:var(--bg);}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#app{max-width:430px;margin:0 auto;padding:16px 16px 88px;}
/* NAV */
.nav{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;background:#fff;border-radius:16px;padding:4px;margin-bottom:16px;box-shadow:var(--shadow);}
.nav-btn{padding:8px 2px;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;cursor:pointer;color:var(--text3);background:transparent;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.nav-btn .ni{font-size:18px;}
.nav-btn.active{background:var(--bg);color:var(--text);}
/* TOPBAR */
.topbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.prog-wrap{flex:1;background:#e5e0f8;border-radius:99px;height:10px;overflow:hidden;}
.prog-bar{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.pill{font-size:12px;font-weight:800;padding:5px 10px;border-radius:99px;white-space:nowrap;}
.pill-xp{background:#fef3c7;color:#92400e;}
.pill-streak{background:#fee2e2;color:#991b1b;}
/* ONBOARDING */
.onboard-wrap{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem 1rem;}
.onboard-flag{font-size:72px;margin-bottom:16px;}
.onboard-title{font-size:26px;font-weight:900;color:var(--text);margin-bottom:8px;}
.onboard-sub{font-size:15px;color:var(--text2);font-weight:700;margin-bottom:28px;line-height:1.6;}
.name-input{width:100%;max-width:300px;padding:16px 20px;font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;border-radius:var(--radius);border:2.5px solid #ddd6fe;background:#fff;color:var(--text);outline:none;text-align:center;margin-bottom:14px;transition:border-color .15s;}
.name-input:focus{border-color:#a78bfa;}
.name-input::placeholder{color:var(--text3);font-weight:600;}
.start-btn{background:#a78bfa;color:#fff;border:none;border-radius:var(--radius);padding:16px 40px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:900;cursor:pointer;box-shadow:0 4px 0 #7c3aed;transition:transform .12s;}
.start-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #7c3aed;}
/* PROFILE */
.profile-card{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin-bottom:12px;display:flex;align-items:center;gap:12px;}
.profile-avatar{width:46px;height:46px;border-radius:50%;background:#ede9fe;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#5b21b6;flex-shrink:0;}
.profile-name{font-size:16px;font-weight:900;color:var(--text);}
.profile-sub{font-size:11px;color:var(--text2);font-weight:700;margin-top:2px;}
/* LEVEL SECTIONS */
.level-header{display:flex;align-items:center;gap:10px;margin:14px 0 10px;padding:10px 14px;border-radius:var(--radius-sm);}
.level-dot{width:12px;height:12px;border-radius:50%;}
.level-title{font-size:13px;font-weight:900;}
.level-sub{font-size:11px;opacity:.7;margin-left:auto;font-weight:700;}
.lv-beginner{background:#f0fdf4;color:#065f46;}
.lv-beginner .level-dot{background:#34d399;}
.lv-medium{background:#fffbeb;color:#92400e;}
.lv-medium .level-dot{background:#fbbf24;}
.lv-advanced{background:#fff1f2;color:#9f1239;}
.lv-advanced .level-dot{background:#fb7185;}
.lv-bonus{background:#faf5ff;color:#6b21a8;}
.lv-bonus .level-dot{background:#c084fc;}
/* CHAPTERS */
.ch-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px;}
.ch-card{border-radius:14px;padding:12px;cursor:pointer;transition:transform .16s;position:relative;overflow:hidden;min-height:88px;display:flex;flex-direction:column;justify-content:flex-end;box-shadow:var(--shadow);border:2px solid transparent;}
.ch-card:not(.locked):active{transform:scale(.96);}
.ch-card:not(.locked):hover{transform:translateY(-2px);}
.ch-card.locked{opacity:.32;cursor:not-allowed;}
.ch-card.done{border-color:currentColor;}
.ch-bg-emoji{position:absolute;top:4px;right:8px;font-size:32px;opacity:.18;}
.ch-status{position:absolute;top:8px;left:10px;font-size:14px;}
.ch-name{font-size:13px;font-weight:900;position:relative;}
.ch-meta{font-size:10px;opacity:.6;margin-top:2px;position:relative;font-weight:700;}
/* Chapter color classes */
.cc0{background:#ede9fe;color:#5b21b6;}.cc1{background:#dbeafe;color:#1e40af;}.cc2{background:#d1fae5;color:#065f46;}
.cc3{background:#fce7f3;color:#9d174d;}.cc4{background:#e0f2fe;color:#0c4a6e;}.cc5{background:#ffedd5;color:#9a3412;}
.cc6{background:#fef9c3;color:#854d0e;}.cc7{background:#fae8ff;color:#6b21a8;}.cc8{background:#dcfce7;color:#14532d;}
.cc9{background:#f1f5f9;color:#334155;}.cc10{background:#fff7ed;color:#9a3412;}.cc11{background:#ecfdf5;color:#065f46;}
.cc12{background:#eff6ff;color:#1e40af;}.cc13{background:#fdf4ff;color:#701a75;}.cc14{background:#f0fdf4;color:#14532d;}
.cc15{background:#fff1f2;color:#9f1239;}.cc16{background:#fefce8;color:#854d0e;}.cc17{background:#f0f9ff;color:#0c4a6e;}
.cc18{background:#fdf2f8;color:#831843;}.cc19{background:#f5f3ff;color:#4c1d95;}.cc20{background:#fff8f1;color:#7c2d12;}
.cc21{background:#fef2f2;color:#991b1b;}.cc22{background:#f0fdf4;color:#052e16;}.cc23{background:#fafaf9;color:#1c1917;}
.cc24{background:#fffbeb;color:#78350f;}
/* Bonus chapter special style */
.ch-card.bonus-locked{opacity:.25;cursor:not-allowed;border:2px dashed currentColor;}
.ch-card.bonus-unlocked{border:2.5px solid #c084fc;box-shadow:0 0 0 3px rgba(192,132,252,.15);}
/* DAILY */
.daily-card{background:#fff;border-radius:var(--radius);padding:14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:var(--shadow);border:2px solid #fde68a;transition:transform .15s;}
.daily-card:hover{transform:scale(1.01);}
.daily-icon{font-size:28px;}
.daily-title{font-size:13px;font-weight:900;color:#92400e;}
.daily-sub{font-size:11px;color:var(--text2);margin-top:2px;font-weight:600;}
.daily-badge{margin-left:auto;background:#fef3c7;color:#92400e;font-size:11px;font-weight:900;padding:4px 10px;border-radius:99px;white-space:nowrap;flex-shrink:0;}
/* WEEKLY CHALLENGE */
.weekly-card{background:linear-gradient(135deg,#667eea,#764ba2);border-radius:var(--radius);padding:16px;margin-bottom:12px;cursor:pointer;box-shadow:0 4px 16px rgba(102,126,234,.35);transition:transform .15s;}
.weekly-card:hover{transform:translateY(-2px);}
.weekly-card.done-card{background:linear-gradient(135deg,#11998e,#38ef7d);cursor:default;}
.weekly-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.weekly-label{font-size:10px;font-weight:900;color:rgba(255,255,255,.75);text-transform:uppercase;letter-spacing:.08em;}
.weekly-badge{background:rgba(255,255,255,.2);color:#fff;font-size:10px;font-weight:900;padding:3px 10px;border-radius:99px;}
.weekly-phrase{font-size:22px;font-weight:900;color:#fff;margin-bottom:4px;line-height:1.2;}
.weekly-sv{font-size:13px;color:rgba(255,255,255,.85);font-weight:700;margin-bottom:10px;}
.weekly-to{display:flex;align-items:center;gap:8px;}
.weekly-avatar{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:16px;}
.weekly-person{font-size:12px;font-weight:800;color:rgba(255,255,255,.9);}
.weekly-hint{font-size:11px;color:rgba(255,255,255,.65);margin-top:2px;}
/* LESSON */
.lesson-wrap{border-radius:var(--radius);padding:16px;}
.back-btn{background:rgba(255,255,255,.85);border:1.5px solid rgba(0,0,0,.08);border-radius:99px;padding:7px 16px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--text2);cursor:pointer;margin-bottom:12px;display:inline-flex;align-items:center;gap:5px;transition:background .15s;}
.back-btn:hover{background:#fff;color:var(--text);}
.lesson-meta{font-size:12px;font-weight:800;color:var(--text2);margin-bottom:12px;opacity:.8;}
/* FLASH */
.flash-card{background:#fff;border-radius:20px;padding:26px 20px;text-align:center;margin-bottom:16px;box-shadow:var(--shadow);}
.flash-emoji{font-size:64px;display:block;margin-bottom:12px;}
.flash-sr{font-size:28px;font-weight:900;color:var(--text);margin-bottom:6px;line-height:1.2;}
.flash-sv{font-size:15px;color:var(--text2);margin-bottom:16px;font-weight:700;}
/* LISTEN */
.listen-btn{background:var(--bg);border:1.5px solid #ddd6fe;border-radius:99px;padding:8px 18px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;}
.listen-btn:hover{background:#ede9fe;border-color:#a78bfa;color:var(--text);}
.listen-btn.loading{opacity:.6;cursor:wait;}
.listen-btn svg{width:15px;height:15px;}
/* BUTTONS */
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.action-btn{padding:14px;border:none;border-radius:var(--radius-sm);font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;cursor:pointer;transition:transform .12s,box-shadow .12s;display:flex;align-items:center;justify-content:center;gap:6px;}
.action-btn:active{transform:translateY(2px)!important;box-shadow:0 1px 0 rgba(0,0,0,.1)!important;}
.action-btn:hover{transform:translateY(-2px);}
.btn-skip{background:#f1f0f9;color:var(--text2);box-shadow:0 4px 0 #d8d3f0;}
.btn-green{background:#34d399;color:#052e16;box-shadow:0 4px 0 #10b981;}
.btn-orange{background:#fb923c;color:#fff;box-shadow:0 4px 0 #ea7c26;}
.btn-ghost{background:rgba(255,255,255,.7);color:var(--text2);border:1.5px solid #e5e0f8;box-shadow:none;}
/* GAME */
.game-card{background:#fff;border-radius:20px;padding:18px;box-shadow:var(--shadow);}
.game-tag{display:inline-block;font-size:11px;font-weight:900;padding:4px 10px;border-radius:99px;background:var(--bg);color:var(--text2);margin-bottom:10px;}
.exam-tag{background:#ffedd5;color:#9a3412;}
.daily-tag{background:#fef3c7;color:#92400e;}
.weekly-tag{background:#ede9fe;color:#5b21b6;}
.game-q{font-size:17px;font-weight:900;color:var(--text);margin-bottom:4px;line-height:1.3;}
.game-hint{font-size:13px;color:var(--text2);margin-bottom:14px;font-weight:700;}
/* MATCH */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.match-item{background:var(--bg);border:2px solid #e5e0f8;border-radius:var(--radius-sm);padding:12px 8px;cursor:pointer;font-size:13px;font-weight:800;color:var(--text);text-align:center;min-height:50px;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1.3;}
.match-item:hover{background:#ede9fe;border-color:#a78bfa;}
.match-item.selected{border-color:#7c3aed;background:#ede9fe;color:#5b21b6;}
.match-item.matched{border-color:#10b981;background:#d1fae5;color:#065f46;cursor:default;}
.match-item.wrong-fl{border-color:#f87171;background:#fee2e2;}
/* TF */
.tf-word{font-size:24px;font-weight:900;color:var(--text);text-align:center;margin:10px 0 4px;}
.tf-sv{font-size:14px;color:var(--text2);text-align:center;margin-bottom:18px;font-weight:700;}
.tf-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tf-btn{padding:15px;border-radius:var(--radius-sm);font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.tf-btn:active{transform:scale(.97);}
.tf-btn:disabled{cursor:default;}
.tf-sant{background:#d1fae5;color:#065f46;border-color:#6ee7b7;box-shadow:0 4px 0 #a7f3d0;}
.tf-sant:hover{background:#a7f3d0;}
.tf-falskt{background:#fee2e2;color:#991b1b;border-color:#fca5a5;box-shadow:0 4px 0 #fecaca;}
.tf-falskt:hover{background:#fecaca;}
.tf-btn.correct{background:#10b981;color:#fff;border-color:#059669;box-shadow:0 4px 0 #059669;}
.tf-btn.wrong{background:#ef4444;color:#fff;border-color:#dc2626;box-shadow:0 4px 0 #dc2626;}
.mc-btn{background:var(--bg);border:2px solid #e5e0f8;border-radius:var(--radius-sm);padding:13px 8px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:var(--text);text-align:center;transition:all .15s;}
.mc-btn:hover{background:#ede9fe;border-color:#a78bfa;}
.mc-btn:disabled{cursor:default;}
/* WRITE */
.write-input{width:100%;padding:14px 16px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;border-radius:var(--radius-sm);border:2px solid #e5e0f8;background:var(--bg);color:var(--text);margin-bottom:10px;outline:none;transition:border-color .15s;}
.write-input::placeholder{color:var(--text3);font-weight:600;}
.write-input:focus{border-color:#a78bfa;background:#fff;}
.write-input.correct{border-color:#10b981;background:#d1fae5;color:#065f46;}
.write-input.wrong{border-color:#f87171;background:#fee2e2;color:#991b1b;}
/* FEEDBACK */
.feedback{padding:13px 16px;border-radius:var(--radius-sm);margin-top:12px;font-size:13px;font-weight:700;line-height:1.6;}
.feedback.good{background:#d1fae5;color:#065f46;border-left:4px solid #10b981;}
.feedback.bad{background:#fee2e2;color:#991b1b;border-left:4px solid #f87171;}
.xp-tag{display:inline-block;margin-top:5px;font-size:12px;background:#fef3c7;color:#92400e;padding:3px 10px;border-radius:99px;font-weight:900;}
/* RESULT */
.result-wrap{text-align:center;padding:1.5rem 1rem;}
.result-big{font-size:60px;margin-bottom:10px;}
.result-title{font-size:21px;font-weight:900;color:var(--text);margin-bottom:6px;}
.result-sub{font-size:13px;color:var(--text2);font-weight:700;margin-bottom:18px;}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
.stat-box{background:var(--bg);border-radius:var(--radius-sm);padding:12px;}
.stat-val{font-size:20px;font-weight:900;color:var(--text);}
.stat-lbl{font-size:10px;color:var(--text3);font-weight:800;margin-top:2px;}
.result-banner{border-radius:var(--radius-sm);padding:12px 16px;font-size:13px;font-weight:800;margin-bottom:16px;}
.result-banner.good{background:#d1fae5;color:#065f46;}
.result-banner.bad{background:#fee2e2;color:#991b1b;}
/* DICT */
.dict-card{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px;}
.dict-input-wrap{position:relative;margin-bottom:10px;}
.dict-input{width:100%;padding:14px 50px 14px 16px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;border-radius:var(--radius-sm);border:2px solid #e5e0f8;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;}
.dict-input:focus{border-color:#a78bfa;background:#fff;}
.dict-input::placeholder{color:var(--text3);font-weight:600;}
.dict-search-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:#ede9fe;border:none;border-radius:10px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;}
.dict-result{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin-bottom:8px;}
.dict-word{font-size:20px;font-weight:900;color:var(--text);margin-bottom:6px;}
.dict-pill{display:inline-block;font-size:12px;font-weight:800;padding:3px 10px;border-radius:99px;margin-right:5px;margin-bottom:6px;}
.dict-pill.lat{background:#ede9fe;color:#5b21b6;}
.dict-pill.cyr{background:#fce7f3;color:#9d174d;}
/* ACH */
.ach-header{background:#fff;border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin-bottom:12px;display:flex;align-items:center;gap:12px;}
.ach-prog-wrap{flex:1;background:var(--bg);border-radius:99px;height:8px;overflow:hidden;}
.ach-prog{height:100%;background:#fbbf24;border-radius:99px;transition:width .5s;}
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ach-card{background:#fff;border-radius:var(--radius);padding:12px;text-align:center;box-shadow:var(--shadow);border:2px solid transparent;}
.ach-card.unlocked{border-color:#fbbf24;background:#fffbeb;}
.ach-card.ach-locked{filter:grayscale(1);opacity:.35;}
.ach-emoji{font-size:28px;margin-bottom:6px;display:block;}
.ach-name{font-size:12px;font-weight:900;color:var(--text);margin-bottom:2px;}
.ach-desc{font-size:10px;color:var(--text3);font-weight:700;line-height:1.4;}
.ach-done-tag{font-size:9px;font-weight:900;color:#92400e;background:#fef3c7;padding:2px 8px;border-radius:99px;display:inline-block;margin-top:4px;}
/* WEEKLY MANAGE */
.person-chip{display:inline-flex;align-items:center;gap:6px;background:#fff;border:2px solid #e5e0f8;border-radius:99px;padding:6px 12px;margin:4px;font-size:12px;font-weight:800;color:var(--text);cursor:pointer;transition:all .15s;}
.person-chip:hover{border-color:#a78bfa;background:#ede9fe;}
.person-chip.active{background:#ede9fe;border-color:#7c3aed;color:#5b21b6;}
.person-chip .del{color:#f87171;font-size:14px;margin-left:4px;}
/* BONUS UNLOCK MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:10000;animation:fadein .2s ease;}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal-box{background:#fff;border-radius:24px;padding:28px 24px;text-align:center;max-width:320px;margin:16px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-emoji{font-size:56px;margin-bottom:12px;}
.modal-title{font-size:20px;font-weight:900;color:var(--text);margin-bottom:8px;}
.modal-sub{font-size:13px;color:var(--text2);font-weight:700;line-height:1.6;margin-bottom:20px;}
/* ANIMS */
.xp-pop{position:fixed;font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;color:#f59e0b;pointer-events:none;animation:floatup .9s ease forwards;z-index:9999;text-shadow:0 2px 8px rgba(0,0,0,.15);}
@keyframes floatup{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-40px) scale(1.1)}100%{opacity:0;transform:translateY(-70px) scale(.9)}}
.pop{animation:pop .3s cubic-bezier(.175,.885,.32,1.275);}
@keyframes pop{0%{transform:scale(1)}55%{transform:scale(1.06)}100%{transform:scale(1)}}
.shake{animation:shake .35s ease;}
@keyframes shake{0%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}100%{transform:translateX(0)}}
.slide-in{animation:slidein .22s ease;}
@keyframes slidein{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
.script-row{display:flex;gap:6px;margin-bottom:12px;}
.script-btn{flex:1;padding:8px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;border-radius:99px;border:2px solid #e5e0f8;background:#fff;color:var(--text2);cursor:pointer;transition:all .15s;}
.script-btn.active{background:#ede9fe;color:#5b21b6;border-color:#c4b5fd;}
.loading-msg{text-align:center;padding:3rem;color:var(--text3);font-size:14px;font-weight:800;}

function defaultState() {
  return {
    dataVersion: DATA_VERSION,
    userName: '', xp: 0, streak: 1, script: 'latin',
    chaptersDone: [],
    chaptersLocked: Array.from({length:25},(_,i)=>i).filter(i=>i>0),
    bonusDone: [], bonusLocked: [100,101,102,103],
    currentChapter: 0, currentLesson: 0, isExam: false, isBonus: false,
    flashWords: [], flashIndex: 0,
    gameIndex: 0, gameCorrect: 0, sessionXp: 0,
    answered: false, q: null,
    matchItems: [], matchSelected: null, matchDone: [],
    totalLessons: 0, dailyDone: 0, perfectExams: 0,
    dictLookups: 0, matchedPairs: 0, weeklyDone: 0,
    dailyDoneToday: false, lastDailyDate: '',
    weeklyDoneThisWeek: false, lastWeeklyDate: '',
    currentWeeklyIdx: 0,
    unlockedAchs: [],
    customPersons: [],
  };
}

function saveState() {
  try {
    const s = {...gs, flashWords:[], q:null, matchItems:[]};
    localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
  } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const saved = JSON.parse(raw);
    const merged = {...defaultState(), ...saved};
    // Recalculate main chapter locks
    merged.chaptersLocked = Array.from({length:25},(_,i)=>i).filter(i=>i>0&&!merged.chaptersDone.includes(i-1));
    // Recalculate bonus locks
    const bv = checkBonusUnlocks(merged);
    merged.bonusLocked = [100,101,102,103].filter(id=>!bv.includes(id));
    // Daily reset
    if (merged.lastDailyDate !== new Date().toDateString()) merged.dailyDoneToday = false;
    // Weekly reset (by ISO week number)
    const thisWeek = getWeekId();
    if (merged.lastWeeklyDate !== thisWeek) merged.weeklyDoneThisWeek = false;
    merged.dataVersion = DATA_VERSION;
    return merged;
  } catch(e) { return defaultState(); }
}

function getWeekId() {
  const d = new Date(); const day = d.getDay() || 7;
  d.setDate(d.getDate() + 4 - day);
  return d.getFullYear() + '-W' + Math.ceil((((d - new Date(d.getFullYear(),0,1)) / 86400000) + 1) / 7);
}

function checkBonusUnlocks(state) {
  const unlocked = [...(state.bonusDone||[])];
  const done = state.chaptersDone || [];
  const beginnerDone = done.filter(x=>x<10).length >= 10;
  const mediumDone   = done.filter(x=>x>=10&&x<18).length >= 8;
  const advancedDone = done.filter(x=>x>=18&&x<25).length >= 7;
  const allDone      = done.length >= 25;
  if (beginnerDone && !unlocked.includes(100)) unlocked.push(100);
  if (mediumDone   && !unlocked.includes(101)) unlocked.push(101);
  if (advancedDone && !unlocked.includes(102)) unlocked.push(102);
  if (allDone      && !unlocked.includes(103)) unlocked.push(103);
  return unlocked;
}

const ttsCache = {};
async function speak(text, btnEl) {
  if (!text) return;
  if (btnEl) { btnEl.classList.add('loading'); btnEl.disabled = true; }
  try {
    let audio = ttsCache[text];
    if (!audio) {
      const r = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE_ID}`, {
        method:'POST',
        headers:{'xi-api-key':ELEVENLABS_API_KEY,'Content-Type':'application/json','Accept':'audio/mpeg'},
        body:JSON.stringify({text,model_id:'eleven_multilingual_v2',voice_settings:{stability:.5,similarity_boost:.75,style:.1,use_speaker_boost:true}})
      });
      if (!r.ok) throw new Error();
      audio = URL.createObjectURL(await r.blob());
      ttsCache[text] = audio;
    }
    const a = new Audio(audio); a.play();
    a.onended = () => { if(btnEl){btnEl.classList.remove('loading');btnEl.disabled=false;} };
  } catch(e) {
    try { window.speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang='hr'; u.rate=.78; window.speechSynthesis.speak(u); } catch(e2){}
    if (btnEl) { btnEl.classList.remove('loading'); btnEl.disabled=false; }
  }
}

function listenBtn(text, id='lb') {
  return `<button class="listen-btn" id="${id}" onclick="speak('${text.replace(/'/g,"\\'")}',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>Lyssna</button>`;
}

function playSound(good) {
  try {
    const ctx=new(window.AudioContext||window.webkitAudioContext)(),o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    if(good){o.frequency.setValueAtTime(523,ctx.currentTime);o.frequency.setValueAtTime(659,ctx.currentTime+.1);o.frequency.setValueAtTime(784,ctx.currentTime+.2);}
    else{o.frequency.setValueAtTime(300,ctx.currentTime);o.frequency.setValueAtTime(220,ctx.currentTime+.15);}
    g.gain.setValueAtTime(.14,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.45);o.start();o.stop(ctx.currentTime+.5);
  } catch(e){}
}

function buildFallback() {
  const words=gs.flashWords,t=getGameType();
  if(t==='match'){
    const pairs=words.slice(0,4).map(w=>({swedish:w.swedish,serbian:gs.script==='latin'?(w.serbian_latin||w.serbian):w.serbian}));
    return {type:'match',pairs,hint:'Para ihop orden!',feedback_correct:encourage(),feedback_wrong:'Nästan – försök igen!',xp:20};
  } else if(t==='trueFalse'){
    const w=words[gs.gameIndex%words.length],ww=words[(gs.gameIndex+1)%words.length],correct=Math.random()>.5;
    const shown_serbian=correct?(gs.script==='latin'?(w.serbian_latin||w.serbian):w.serbian):(gs.script==='latin'?(ww.serbian_latin||ww.serbian):ww.serbian);
    return {type:'trueFalse',shown_swedish:w.swedish,shown_serbian,phonetic:w.phonetic||'',is_correct:correct,hint:'',feedback_correct:encourage(),feedback_wrong:'Fel – titta noga!',xp:15};
  } else if(t==='multipleChoice'){
    const w=words[gs.gameIndex%words.length];
    const wrong=words.filter((_,i)=>i!==gs.gameIndex%words.length).map(x=>x.swedish).sort(()=>Math.random()-.5).slice(0,3);
    const options=[w.swedish,...wrong].sort(()=>Math.random()-.5);
    return {type:'multipleChoice',serbian:gs.script==='latin'?(w.serbian_latin||w.serbian):w.serbian,phonetic:w.phonetic||'',correct_swedish:w.swedish,options,emoji:w.emoji,hint:'Vad betyder ordet?',feedback_correct:encourage(),feedback_wrong:`Rätt: ${w.swedish}`,xp:15};
  } else if(t==='reverseWrite'){
    const w=words[gs.gameIndex%words.length];
    return {type:'reverseWrite',serbian:gs.script==='latin'?(w.serbian_latin||w.serbian):w.serbian,phonetic:w.phonetic||'',correct_swedish:w.swedish,emoji:w.emoji,hint:'Skriv den svenska översättningen',feedback_correct:encourage()+' Du kan svenska och serbiska!',feedback_wrong:`Rätt: ${w.swedish}`,xp:20};
  } else {
    const w=words[gs.gameIndex%words.length];
    return {type:'write',swedish:w.swedish,serbian:gs.script==='latin'?(w.serbian_latin||w.serbian):w.serbian,serbian_latin:w.serbian_latin||w.serbian,phonetic:w.phonetic||'',emoji:w.emoji,hint:'Skriv det serbiska ordet',feedback_correct:encourage()+' Perfekt stavning!',feedback_wrong:`Rätt: ${gs.script==='latin'?(w.serbian_latin||w.serbian):w.serbian}`,xp:20};
  }
}

// Returns game type based on lesson number for progressive difficulty
function getGameType() {
  if(gs.isExam) {
    const examTypes=['write','multipleChoice','match','trueFalse','write','reverseWrite','match','multipleChoice'];
    return examTypes[gs.gameIndex%examTypes.length];
  }
  const lesson = gs.currentLesson; // 0, 1, 2
  const lessonTypes = [
    ['match','trueFalse','multipleChoice','match','trueFalse'],       // Lektion 1: lätt
    ['multipleChoice','write','trueFalse','multipleChoice','match'],   // Lektion 2: medel
    ['write','reverseWrite','match','reverseWrite','write'],           // Lektion 3: svårast
  ];
  return lessonTypes[lesson%3][gs.gameIndex%5];
}

async function loadGame() {
  const total=gs.isExam?EXAM_SIZE:GAME_COUNT;
  if(gs.gameIndex>=total){gs.isExam?showExamResult():showLessonResult();return;}
  gs.answered=false;
  const cur=gs.isExam?gs.gameIndex:(FLASH_COUNT+gs.gameIndex);
  $('app').innerHTML=wrapLesson(`<div class="loading-msg">Nästa övning...</div>`,Math.round((cur/(FLASH_COUNT+GAME_COUNT))*100));
  const type=getGameType();
  const wl=gs.flashWords.map(w=>`${w.swedish}=${gs.script==='latin'?(w.serbian_latin||w.serbian):w.serbian}`).join(',');
  const name=firstName();
  const typeSchemas = {
    match: ',"pairs":[{"swedish":"...","serbian":"..."},{"swedish":"...","serbian":"..."},{"swedish":"...","serbian":"..."},{"swedish":"...","serbian":"..."}]',
    trueFalse: ',"shown_swedish":"...","shown_serbian":"...","phonetic":"...","is_correct":true',
    multipleChoice: ',"serbian":"...","phonetic":"...","correct_swedish":"...","options":["...","...","...","..."],"emoji":"..."',
    reverseWrite: ',"serbian":"...","phonetic":"...","correct_swedish":"...","emoji":"..."',
    write: ',"serbian_latin":"...","phonetic":"..."',
  };
  const extra = typeSchemas[type] || typeSchemas.write;
  const prompt=`Serbisk övning typ "${type}" baserat på: ${wl}. Skript: ${gs.script==='latin'?'Latinsk':'Kyrillisk'}. ${gs.isExam?'PROV.':'Nybörjare, lektion '+(gs.currentLesson+1)+'/3.'} ${name&&name!=='du'?`Eleven heter ${name}, använd namnet i feedback_correct.`:''} phonetic = enkel uttalsskrift t.ex. "zdra-vo". Svara BARA med JSON utan backticks: {"type":"${type}","swedish":"...","serbian":"...","emoji":"...","hint":"...","feedback_correct":"...","feedback_wrong":"..."${extra},"xp":${gs.isExam?30:20}}`;
  try {
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_API_KEY,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:prompt}]})});
    if(!r.ok)throw new Error();
    const d=await r.json();
    gs.q=JSON.parse(d.content[0].text.replace(/```json|```/g,'').trim());
  } catch(e) { gs.q=buildFallback(); }
  renderGame();
}

function renderGame() {
  const q=gs.q, ch=chInfo(), isExam=gs.isExam;
  const cur=isExam?gs.gameIndex:(FLASH_COUNT+gs.gameIndex);
  const pct=Math.round((cur/(isExam?EXAM_SIZE:(FLASH_COUNT+GAME_COUNT)))*100);
  const sp=q.serbian_latin||q.serbian||'';
  const accentColor = isBonus() ? BONUS_ACCENTS[BONUS_CHAPTERS.findIndex(c=>c.id===cc())] : CH_ACCENTS[cc()];
  const shadowColor = isBonus() ? BONUS_SHADOWS[BONUS_CHAPTERS.findIndex(c=>c.id===cc())] : CH_SHADOWS[cc()];
  const tag=isExam?`<div class="game-tag exam-tag">📝 PROV – ${ch.name}</div>`:`<div class="game-tag">${ch.emoji} Lektion ${gs.currentLesson+1} · Övning ${gs.gameIndex+1}/${GAME_COUNT}</div>`;
  const phoneticHtml = q.phonetic ? `<div style="font-size:12px;color:#a78bfa;font-weight:700;font-style:italic;margin:3px 0 8px;">🗣 ${q.phonetic}</div>` : '';
  let inner='';
  if(q.type==='match'){
    const items=[...q.pairs.map(p=>({text:p.swedish,type:'sv',pair:p})),...q.pairs.map(p=>({text:p.serbian,type:'sr',pair:p}))].sort(()=>Math.random()-.5);
    gs.matchItems=items;gs.matchSelected=null;gs.matchDone=[];
    inner=`${tag}<div class="game-q">Para ihop orden</div><div class="game-hint">${q.hint||''}</div><div class="match-grid">${items.map((it,i)=>`<div class="match-item" id="mi${i}" onclick="selMatch(${i})">${it.text}</div>`).join('')}</div><div id="fb"></div>`;
  } else if(q.type==='trueFalse'){
    inner=`${tag}<div class="game-q">Sant eller falskt?</div>${listenBtn(sp)}<div class="tf-word">${q.shown_serbian}</div>${phoneticHtml}<div class="tf-sv">= "${q.shown_swedish}"</div><div class="tf-row"><button class="tf-btn tf-sant" id="tf-y" onclick="checkTF(true)">✓ Sant</button><button class="tf-btn tf-falskt" id="tf-n" onclick="checkTF(false)">✗ Falskt</button></div><div id="fb"></div>`;
  } else if(q.type==='multipleChoice'){
    const opts=(q.options||[]).map((opt,i)=>`<button class="mc-btn" id="mc${i}" onclick="checkMC('${opt.replace(/'/g,"\\'")}')">${opt}</button>`).join('');
    inner=`${tag}<div class="game-q">${q.emoji||''} ${q.serbian}</div>${phoneticHtml}<div class="game-hint">${q.hint||'Vad betyder ordet?'}</div>${listenBtn(sp)}<div class="mc-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;">${opts}</div><div id="fb"></div>`;
  } else if(q.type==='reverseWrite'){
    inner=`${tag}<div class="game-q">${q.emoji||''} ${q.serbian}</div>${phoneticHtml}<div class="game-hint">${q.hint||'Skriv den svenska översättningen'}</div>${listenBtn(sp)}<input class="write-input" id="wi" type="text" placeholder="Skriv på svenska…" autocomplete="off" autocorrect="off" spellcheck="false"/><div id="fb"></div><button class="action-btn" id="cb" onclick="checkReverseWrite()" style="width:100%;background:${accentColor};color:#fff;box-shadow:0 4px 0 ${shadowColor};">Kontrollera</button>`;
  } else {
    inner=`${tag}<div class="game-q">${q.emoji||''} ${q.swedish}</div><div class="game-hint">${q.hint||''}</div>${listenBtn(sp)}<div class="tf-word" style="font-size:18px;margin:8px 0 4px;">${sp}</div>${phoneticHtml}<input class="write-input" id="wi" type="text" placeholder="Skriv på serbiska…" autocomplete="off" autocorrect="off" spellcheck="false"/><div id="fb"></div><button class="action-btn" id="cb" onclick="checkWrite()" style="width:100%;background:${accentColor};color:#fff;box-shadow:0 4px 0 ${shadowColor};">Kontrollera</button>`;
  }
  $('app').innerHTML=wrapLesson(`<button class="back-btn" onclick="showMap()">← Tillbaka</button><div class="game-card" id="gc">${inner}</div>`,pct);
  if(q.type==='write')$('wi')?.addEventListener('keydown',e=>{if(e.key==='Enter'&&!gs.answered)checkWrite();});
  if(q.type==='reverseWrite')$('wi')?.addEventListener('keydown',e=>{if(e.key==='Enter'&&!gs.answered)checkReverseWrite();});
  if(q.type==='trueFalse'||q.type==='multipleChoice'||q.type==='reverseWrite')speak(sp);
}

function checkMC(chosen){
  if(gs.answered)return; gs.answered=true;
  const correct=chosen===gs.q.correct_swedish;
  document.querySelectorAll('.mc-btn').forEach(btn=>{
    btn.disabled=true;
    if(btn.textContent===gs.q.correct_swedish) btn.style.cssText='background:#d1fae5;color:#065f46;border:2px solid #10b981;border-radius:12px;padding:12px;font-family:Nunito,sans-serif;font-size:14px;font-weight:900;';
    else if(btn.textContent===chosen&&!correct) btn.style.cssText='background:#fee2e2;color:#991b1b;border:2px solid #f87171;border-radius:12px;padding:12px;font-family:Nunito,sans-serif;font-size:14px;font-weight:900;';
  });
  showFeedback(correct);
}

function checkReverseWrite(){
  if(gs.answered)return; const val=($('wi')||{}).value||''; if(!val.trim())return;
  gs.answered=true;
  const correct=val.trim().toLowerCase()===(gs.q.correct_swedish||'').trim().toLowerCase();
  const inp=$('wi'); if(inp){inp.disabled=true;inp.classList.add(correct?'correct':'wrong');}
  showFeedback(correct);
}

function selMatch(i){
  if(gs.answered)return;
  const items=gs.matchItems;if(gs.matchDone.includes(i))return;
  if(gs.matchSelected===null){gs.matchSelected=i;$('mi'+i)?.classList.add('selected');}
  else{
    const a=gs.matchSelected,b=i;$('mi'+a)?.classList.remove('selected');
    const ok=items[a].pair===items[b].pair&&items[a].type!==items[b].type;
    if(ok){
      playSound(true);[$('mi'+a),$('mi'+b)].forEach(el=>{if(el){el.classList.add('matched');el.onclick=null;}});
      gs.matchDone.push(a,b);gs.xp+=3;gs.sessionXp+=3;gs.matchedPairs++;showXpPop(3,$('mi'+b));save();
      if(gs.matchDone.length>=items.length){gs.gameCorrect++;setTimeout(()=>showFeedback(true),300);}
    } else {
      playSound(false);[$('mi'+a),$('mi'+b)].forEach(el=>{if(el){el.classList.add('wrong-fl');setTimeout(()=>el?.classList.remove('wrong-fl'),500);}});
    }
    gs.matchSelected=null;
  }
}

function checkTF(ans){
  if(gs.answered)return;gs.answered=true;
  const correct=ans===gs.q.is_correct;
  $('tf-y').disabled=true;$('tf-n').disabled=true;
  $('tf-y').classList.toggle('correct',gs.q.is_correct===true);$('tf-n').classList.toggle('correct',gs.q.is_correct===false);
  if(!correct)$(ans?'tf-y':'tf-n').classList.add('wrong');
  showFeedback(correct);
}

function checkWrite(){
  if(gs.answered)return;const val=($('wi')||{}).value||'';if(!val.trim())return;
  gs.answered=true;const correct=val.trim().toLowerCase()===gs.q.serbian.trim().toLowerCase();
  const inp=$('wi');if(inp){inp.disabled=true;inp.classList.add(correct?'correct':'wrong');}
  showFeedback(correct);
}

function showFeedback(correct){
  const q=gs.q,xp=correct?(q.xp||20):4;
  playSound(correct);gs.xp+=xp;gs.sessionXp+=xp;if(correct)gs.gameCorrect++;
  const fb=$('fb');if(fb)fb.innerHTML=`<div class="feedback ${correct?'good':'bad'}">${correct?q.feedback_correct:q.feedback_wrong}<div><span class="xp-tag">+${xp} XP</span></div></div>`;
  const gc=$('gc');if(gc){gc.classList.remove('pop','shake');void gc.offsetWidth;gc.classList.add(correct?'pop':'shake');}
  showXpPop(xp,fb);save();
  const next=`gs.gameIndex++;gs.answered=false;loadGame();`;
  const btn=`<button class="action-btn btn-green" style="width:100%;margin-top:12px;" onclick="${next}">Fortsätt →</button>`;
  if(q.type==='write'){const cb=$('cb');if(cb)cb.outerHTML=btn;}
  else if(gc&&(q.type!=='match'||gs.matchDone.length>=(gs.matchItems?.length||0)))gc.insertAdjacentHTML('beforeend',btn);
  checkAchievements();
}

function showLessonResult(){
  const pct=Math.round((gs.gameCorrect/GAME_COUNT)*100);
  const ch=chInfo(),nxt=gs.currentLesson+1,isLast=nxt>=LESSONS_PER_CHAPTER;
  const medal=pct>=80?'🏆':pct>=60?'⭐':'💪';
  gs.totalLessons++;save();
  $('app').innerHTML=wrapLesson(`<div class="result-wrap">
    <div class="result-big">${medal}</div>
    <div class="result-title">${encourage()}</div>
    <div class="result-sub">${isLast?`Alla lektioner i ${ch.name} klara!`:`${LESSONS_PER_CHAPTER-nxt} lektion(er) kvar`}</div>
    <div class="stat-row"><div class="stat-box"><div class="stat-val">${gs.sessionXp}</div><div class="stat-lbl">XP tjänat</div></div><div class="stat-box"><div class="stat-val">${gs.gameCorrect}/${GAME_COUNT}</div><div class="stat-lbl">Rätt</div></div><div class="stat-box"><div class="stat-val">${pct}%</div><div class="stat-lbl">Precision</div></div></div>
    ${isLast?`<button class="action-btn btn-orange" style="width:100%;margin-bottom:10px;" onclick="startExam()">Dags för provet! 📝</button>`:`<button class="action-btn btn-green" style="width:100%;margin-bottom:10px;" onclick="startNextLesson()">Nästa lektion →</button>`}
    <button class="action-btn btn-ghost" style="width:100%;" onclick="showMap()">← Kapitelkarta</button>
  </div>`,100);
  checkAchievements();
}

function startNextLesson(){gs.currentLesson++;gs.flashWords=[];gs.flashIndex=0;gs.gameIndex=0;gs.gameCorrect=0;gs.sessionXp=0;gs.answered=false;save();loadFlashWords();}
function startExam(){gs.isExam=true;gs.gameIndex=0;gs.gameCorrect=0;gs.sessionXp=0;gs.answered=false;save();loadGame();}

function showExamResult(){
  const pct=Math.round((gs.gameCorrect/EXAM_SIZE)*100);
  const passed=pct>=PASS_PCT,ch=chInfo();
  if(passed){
    if(isBonus()){
      if(!gs.bonusDone.includes(cc()))gs.bonusDone.push(cc());
    } else {
      if(!gs.chaptersDone.includes(cc()))gs.chaptersDone.push(cc());
      const nxt=cc()+1;if(nxt<25)gs.chaptersLocked=gs.chaptersLocked.filter(x=>x!==nxt);
    }
    gs.xp+=60;gs.sessionXp+=60;if(pct===100)gs.perfectExams++;
  }
  save();
  const medal=passed?(pct>=90?'🏆':pct>=80?'⭐':'✅'):'❌';
  $('app').innerHTML=wrapLesson(`<div class="result-wrap">
    <div class="result-big">${medal}</div>
    <div class="result-title">${passed?encourage():'Försök igen!'}</div>
    <div class="result-sub">${ch.emoji} ${ch.name}</div>
    <div class="result-banner ${passed?'good':'bad'}">${passed?`🎉 Grattis! ${pct}% rätt! +60 XP!`:`Du fick ${pct}% – du behöver ${PASS_PCT}% för att gå vidare.`}</div>
    <div class="stat-row"><div class="stat-box"><div class="stat-val">${gs.gameCorrect}/${EXAM_SIZE}</div><div class="stat-lbl">Rätt</div></div><div class="stat-box"><div class="stat-val">${pct}%</div><div class="stat-lbl">Resultat</div></div><div class="stat-box"><div class="stat-val">${PASS_PCT}%</div><div class="stat-lbl">Krav</div></div></div>
    ${passed?`<button class="action-btn btn-green" style="width:100%;margin-bottom:10px;" onclick="showMap()">Välj nästa kapitel ✨</button>`:`<button class="action-btn btn-orange" style="width:100%;margin-bottom:10px;" onclick="retryChapter()">Gör om kapitlet</button>`}
  </div>`,100);
  checkAchievements();
}

function retryChapter(){gs.currentLesson=0;gs.isExam=false;gs.flashWords=[];gs.flashIndex=0;gs.gameIndex=0;gs.gameCorrect=0;gs.sessionXp=0;gs.answered=false;save();loadFlashWords();}

function startDailyGame(){
  const availableChapters = gs.chaptersDone.length > 0 ? gs.chaptersDone : [0];
  gs.currentChapter=availableChapters[Math.floor(Math.random()*availableChapters.length)];
  gs.isBonus=false;
  gs.flashWords=FALLBACK[gs.currentChapter]||FALLBACK[0];
  gs.gameIndex=0;gs.gameCorrect=0;gs.sessionXp=0;gs.answered=false;
  loadDailyQ();
}

async function loadDailyQ(){
  if(gs.gameIndex>=5){endDaily();return;}
  gs.answered=false;
  $('app').innerHTML=`<div>${renderNav('daily')}<div class="loading-msg">Laddar fråga ${gs.gameIndex+1}/5...</div></div>`;
  const types=['match','trueFalse','write','match','trueFalse'],type=types[gs.gameIndex%types.length];
  const wl=gs.flashWords.map(w=>`${w.swedish}=${w.serbian_latin||w.serbian}`).join(',');
  const name=firstName();
  const prompt=`Serbisk övning typ "${type}" baserat på: ${wl}. Latinsk skrift. ${name&&name!=='du'?`Eleven heter ${name}.`:''} Svara BARA med JSON utan backticks: {"type":"${type}","swedish":"...","serbian":"...","serbian_latin":"...","emoji":"...","hint":"...","feedback_correct":"...","feedback_wrong":"..."${type==='match'?',"pairs":[{"swedish":"...","serbian":"..."},{"swedish":"...","serbian":"..."},{"swedish":"...","serbian":"..."},{"swedish":"...","serbian":"..."}]':type==='trueFalse'?',"shown_swedish":"...","shown_serbian":"...","is_correct":true':''},"xp":40}`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_API_KEY,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:700,messages:[{role:'user',content:prompt}]})});
    if(!r.ok)throw new Error();
    const d=await r.json(); gs.q=JSON.parse(d.content[0].text.replace(/```json|```/g,'').trim());
  }catch(e){gs.q=buildFallback();gs.q.xp=40;}
  renderDailyQ();
}

function renderDailyQ(){
  const q=gs.q,sp=q.serbian_latin||q.serbian||'';
  const tag=`<div class="game-tag daily-tag">⚡ Utmaning · Fråga ${gs.gameIndex+1}/5</div>`;
  let inner='';
  if(q.type==='match'){
    const items=[...q.pairs.map(p=>({text:p.swedish,type:'sv',pair:p})),...q.pairs.map(p=>({text:p.serbian,type:'sr',pair:p}))].sort(()=>Math.random()-.5);
    gs.matchItems=items;gs.matchSelected=null;gs.matchDone=[];
    inner=`${tag}<div class="game-q">Para ihop orden</div><div class="game-hint">${q.hint||''}</div><div class="match-grid">${items.map((it,i)=>`<div class="match-item" id="mi${i}" onclick="selDM(${i})">${it.text}</div>`).join('')}</div><div id="fb"></div>`;
  }else if(q.type==='trueFalse'){
    inner=`${tag}<div class="game-q">Sant eller falskt?</div>${listenBtn(sp)}<div class="tf-word">${q.shown_serbian}</div><div class="tf-sv">= "${q.shown_swedish}"</div><div class="tf-row"><button class="tf-btn tf-sant" id="tf-y" onclick="checkDTF(true)">✓ Sant</button><button class="tf-btn tf-falskt" id="tf-n" onclick="checkDTF(false)">✗ Falskt</button></div><div id="fb"></div>`;
  }else{
    inner=`${tag}<div class="game-q">${q.emoji||''} ${q.swedish}</div><div class="game-hint">${q.hint||''}</div>${listenBtn(sp)}<input class="write-input" id="wi" type="text" placeholder="Skriv på serbiska…" autocomplete="off" autocorrect="off" spellcheck="false"/><div id="fb"></div><button class="action-btn" id="cb" onclick="checkDW()" style="width:100%;background:#fbbf24;color:#78350f;box-shadow:0 4px 0 #f59e0b;">Kontrollera</button>`;
  }
  $('app').innerHTML=`<div class="slide-in">${renderNav('daily')}<div class="topbar"><div class="prog-wrap"><div class="prog-bar" style="width:${gs.gameIndex/5*100}%;background:#fbbf24;"></div></div><div class="pill pill-xp">⭐ ${gs.xp}</div></div><div class="game-card" id="gc">${inner}</div></div>`;
  if(q.type==='write')$('wi')?.addEventListener('keydown',e=>{if(e.key==='Enter'&&!gs.answered)checkDW();});
  if(q.type==='trueFalse')speak(sp);
}

function selDM(i){
  if(gs.answered)return;const items=gs.matchItems;if(gs.matchDone.includes(i))return;
  if(gs.matchSelected===null){gs.matchSelected=i;$('mi'+i)?.classList.add('selected');}
  else{const a=gs.matchSelected,b=i;$('mi'+a)?.classList.remove('selected');
    const ok=items[a].pair===items[b].pair&&items[a].type!==items[b].type;
    if(ok){playSound(true);[$('mi'+a),$('mi'+b)].forEach(el=>{if(el){el.classList.add('matched');el.onclick=null;}});gs.matchDone.push(a,b);gs.xp+=6;gs.sessionXp+=6;gs.matchedPairs++;showXpPop(6,$('mi'+b));save();if(gs.matchDone.length>=items.length){gs.gameCorrect++;setTimeout(()=>showDFB(true),300);}}
    else{playSound(false);[$('mi'+a),$('mi'+b)].forEach(el=>{if(el){el.classList.add('wrong-fl');setTimeout(()=>el?.classList.remove('wrong-fl'),500);}});}
    gs.matchSelected=null;}
}
function checkDTF(ans){if(gs.answered)return;gs.answered=true;const correct=ans===gs.q.is_correct;$('tf-y').disabled=true;$('tf-n').disabled=true;$('tf-y').classList.toggle('correct',gs.q.is_correct===true);$('tf-n').classList.toggle('correct',gs.q.is_correct===false);if(!correct)$(ans?'tf-y':'tf-n').classList.add('wrong');showDFB(correct);}
function checkDW(){if(gs.answered)return;const val=($('wi')||{}).value||'';if(!val.trim())return;gs.answered=true;const correct=val.trim().toLowerCase()===gs.q.serbian.trim().toLowerCase();const inp=$('wi');if(inp){inp.disabled=true;inp.classList.add(correct?'correct':'wrong');}showDFB(correct);}

function showDFB(correct){
  const q=gs.q,xp=correct?(q.xp||40):6;
  playSound(correct);gs.xp+=xp;gs.sessionXp+=xp;if(correct)gs.gameCorrect++;
  const fb=$('fb');if(fb)fb.innerHTML=`<div class="feedback ${correct?'good':'bad'}">${correct?q.feedback_correct:q.feedback_wrong}<div><span class="xp-tag">+${xp} XP ⚡</span></div></div>`;
  const gc=$('gc');if(gc){gc.classList.remove('pop','shake');void gc.offsetWidth;gc.classList.add(correct?'pop':'shake');}
  showXpPop(xp,fb);save();
  const btn=`<button class="action-btn btn-green" style="width:100%;margin-top:12px;" onclick="gs.gameIndex++;gs.answered=false;loadDailyQ();">Fortsätt →</button>`;
  if(q.type==='write'){const cb=$('cb');if(cb)cb.outerHTML=btn;}
  else if(gc&&(q.type!=='match'||gs.matchDone.length>=(gs.matchItems?.length||0)))gc.insertAdjacentHTML('beforeend',btn);
}

function endDaily(){
  gs.dailyDoneToday=true;gs.dailyDone++;gs.streak++;gs.xp+=30;gs.lastDailyDate=new Date().toDateString();save();
  checkAchievements();
  $('app').innerHTML=`<div class="slide-in">${renderNav('daily')}<div class="result-wrap">
    <div class="result-big">🌟</div>
    <div class="result-title">${encourage()}</div>
    <div class="result-sub">+30 XP streak-bonus!</div>
    <div class="stat-row"><div class="stat-box"><div class="stat-val">${gs.sessionXp}</div><div class="stat-lbl">XP idag</div></div><div class="stat-box"><div class="stat-val">${gs.streak}</div><div class="stat-lbl">Streak 🔥</div></div><div class="stat-box"><div class="stat-val">${gs.dailyDone}</div><div class="stat-lbl">Totalt</div></div></div>
    <button class="action-btn btn-green" style="width:100%;margin-bottom:10px;" onclick="showMap()">Fortsätt träna →</button>
  </div></div>`;
}

}

function doDict(){
  const val=($('di')||{}).value||'';if(!val.trim())return;
  const out=$('dict-out');if(!out)return;
  gs.dictLookups++;save();checkAchievements();
  const q=val.toLowerCase().trim();
  const results=DICT.filter(w=>w.sv.toLowerCase().includes(q)||w.sr.toLowerCase().includes(q)||w.sc.toLowerCase().includes(q)||w.cat.toLowerCase().includes(q)).slice(0,12);
  if(!results.length){out.innerHTML=`<div style="text-align:center;padding:1.5rem;color:var(--text3);font-size:13px;font-weight:800;">Hittade inget för "${val}"</div>`;return;}
  out.innerHTML=results.map(r=>`<div class="dict-result slide-in">
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:5px;"><div class="dict-word">${r.sv}</div><div style="font-size:10px;font-weight:800;color:var(--text3);background:var(--bg);padding:2px 7px;border-radius:99px;">${r.cat}</div></div>
    <div><span class="dict-pill lat">${r.sr}</span><span class="dict-pill cyr">${r.sc}</span></div>
    ${listenBtn(r.sr,'lb_'+r.sv.replace(/\s/g,'_'))}
    <div style="font-size:12px;color:var(--text2);font-weight:700;margin-top:6px;">🗣 Uttal: <em>${r.pron}</em></div>
  </div>`).join('');
}

// ═══════════════════════════════════════════════════
// ACHIEVEMENTS
// ═══════════════════════════════════════════════════
function showAch(){
  const unl=gs.unlockedAchs.length;
  $('app').innerHTML=`<div class="slide-in">${renderNav('ach')}${renderTopbar(Math.min(100,gs.xp/50),'#fbbf24')}
    <div class="ach-header"><div style="font-size:26px;">🏅</div><div style="flex:1;"><div style="font-size:13px;font-weight:900;color:var(--text);margin-bottom:5px;">${unl} av ${ACHIEVEMENTS.length} badges</div><div class="ach-prog-wrap"><div class="ach-prog" style="width:${Math.round(unl/ACHIEVEMENTS.length*100)}%;"></div></div></div></div>
    <div class="ach-grid">${ACHIEVEMENTS.map(a=>{const done=gs.unlockedAchs.includes(a.id);return `<div class="ach-card ${done?'unlocked':'ach-locked'}"><span class="ach-emoji">${a.emoji}</span><div class="ach-name">${a.name}</div><div class="ach-desc">${a.desc}</div>${done?`<div class="ach-done-tag">✓ Upplåst</div>`:''}</div>`;}).join('')}</div>
  </div>`;
}

// ═══════════════════════════════════════════════════
// PASSWORD PROTECTION
// ═══════════════════════════════════════════════════
const APP_PASSWORD = 'serbiska2026'; // Byt till eget lösenord!

function showPasswordScreen() {
  $('app').innerHTML=`<div class="slide-in"><div class="onboard-wrap">
    <div class="onboard-flag">🔒</div>
    <div class="onboard-title">Serbiska-appen</div>
    <div class="onboard-sub">Ange lösenord för att fortsätta.</div>
    <input class="name-input" id="pwInput" type="password" placeholder="Lösenord..." autocomplete="off"/>
    <div id="pw-err" style="color:#ef4444;font-size:13px;font-weight:800;margin-bottom:10px;min-height:18px;"></div>
    <button class="start-btn" onclick="checkPassword()">Öppna appen 🔓</button>
  </div></div>`;
  $('pwInput')?.focus();
  $('pwInput')?.addEventListener('keydown',e=>{if(e.key==='Enter')checkPassword();});
}

function checkPassword() {
  const val=($('pwInput')||{}).value||'';
  if(val===APP_PASSWORD) {
    sessionStorage.setItem('serbiska_auth','1');
    startApp();
  } else {
    const err=$('pw-err');
    if(err) err.textContent='Fel lösenord, försök igen!';
    const inp=$('pwInput');
    if(inp){inp.value='';inp.classList.add('wrong');setTimeout(()=>inp.classList.remove('wrong'),600);}
  }
}

function startApp() {
  if(!gs.userName||gs.userName==='du'){showOnboarding();}else{showMap();}
}

// ═══════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════
if(sessionStorage.getItem('serbiska_auth')==='1'){
  startApp();
} else {
  showPasswordScreen();
}
</script>
